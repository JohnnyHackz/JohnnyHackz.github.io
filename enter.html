     Scrapers don't run JS so they read these directly; humans get redirected to index.html. -->

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#070b12; --line:#182235; --fog:#5d6b80; --vital:#38e0b0; --pulse:#f5c451;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--ink);color:#9fb0c4;font-family:var(--mono);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(900px 500px at 80% -10%, rgba(56,224,176,.06), transparent),
    radial-gradient(700px 400px at -10% 30%, rgba(245,196,81,.04), transparent);}
/* faint scanlines, same texture as the site */
body::after{content:"";position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);
  mix-blend-mode:overlay;opacity:.5;}
#rain{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.16}
.term{position:relative;z-index:1;width:min(560px,90vw);padding:0 22px}
.bline{font-size:13px;line-height:2;color:#9fb0c4;opacity:0;letter-spacing:.5px}
.bline.show{opacity:1}
.bline .ok2{color:var(--vital)}
.bline .dim{color:var(--fog)}
.bline .amber{color:var(--pulse)}
.bprog{height:4px;background:var(--line);border-radius:2px;margin:14px 0 4px;overflow:hidden;opacity:0;transition:opacity .2s}
.bprog.show{opacity:1}
.bfill{height:100%;width:0;background:var(--vital);box-shadow:0 0 10px var(--vital);transition:width 1.1s cubic-bezier(.3,.1,.2,1)}
.grant{margin-top:20px;font-size:22px;font-weight:600;letter-spacing:4px;color:var(--vital);
  text-align:center;opacity:0;text-shadow:0 0 18px rgba(56,224,176,.6)}
.grant.show{opacity:1;animation:grantIn .4s ease-out}
@keyframes grantIn{from{transform:scale(.95);letter-spacing:8px}}
.cur{display:inline-block;width:8px;height:14px;background:var(--vital);
  vertical-align:middle;margin-left:2px;animation:cblink 1s steps(2) infinite}
@keyframes cblink{50%{opacity:0}}
.skip{position:fixed;bottom:18px;right:20px;z-index:2;font-size:11px;color:var(--fog);
  letter-spacing:1px;text-decoration:none;border:1px solid var(--line);border-radius:5px;
  padding:7px 12px;transition:all .2s}
.skip:hover{color:var(--vital);border-color:var(--vital)}
@media(prefers-reduced-motion:reduce){.cur,#rain{display:none}}
</style>
</head>
<body>
<canvas id="rain" aria-hidden="true"></canvas>

<div class="term" id="term">
  <div class="bline" data-b="0"><span class="dim">$</span> initializing secure session<span class="cur" id="cur"></span></div>
  <div class="bline" data-b="1"><span class="dim">›</span> verifying client integrity <span class="ok2">[ ok ]</span></div>
  <div class="bline" data-b="2"><span class="dim">›</span> negotiating TLS 1.3 · cipher suite <span class="ok2">[ ok ]</span></div>
  <div class="bline" data-b="3"><span class="dim">›</span> authenticating visitor <span class="amber">· anonymous</span></div>
  <div class="bprog" id="prog"><div class="bfill" id="fill"></div></div>
  <div class="bline" data-b="4"><span class="dim">›</span> establishing connection to <span class="ok2">jberentsen-prod</span></div>
  <div class="grant" id="grant">ACCESS GRANTED</div>
</div>

<a class="skip" href="index.html" id="skip">SKIP →</a>

<script>
(function(){
  var DEST='index.html';
  var reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  function markDone(){ try{ sessionStorage.setItem('booted','1'); }catch(e){} }
  function go(){ markDone(); window.location.replace(DEST); }

  // If the boot already played this session (e.g. bf-cache restore, back button,
  // or a stray re-entry), don't replay it — forward straight to the site.
  var alreadyBooted=false;
  try{ alreadyBooted = sessionStorage.getItem('booted')==='1'; }catch(e){}
  if(reduce || alreadyBooted){ go(); return; }

  // iOS/Safari can restore this page from the back-forward cache mid-animation.
  // If that happens, jump straight to the site instead of replaying.
  window.addEventListener('pageshow', function(ev){
    if(ev.persisted){ go(); }
  });

  // ambient rain
  (function(){
    var cv=document.getElementById('rain');if(!cv)return;
    var ctx=cv.getContext('2d'),W,H,cols,drops,font=15;
    function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;cols=Math.floor(W/font);
      drops=new Array(cols).fill(0).map(function(){return Math.random()*-H/font;});}
    size();addEventListener('resize',size);ctx.textBaseline='top';var last=0;
    (function draw(now){
      if(now-last>55){last=now;ctx.fillStyle='rgba(7,11,18,0.14)';ctx.fillRect(0,0,W,H);
        ctx.font=font+"px 'IBM Plex Mono',monospace";
        for(var i=0;i<cols;i++){var x=i*font,y=drops[i]*font;
          ctx.fillStyle='rgba(120,255,214,0.95)';ctx.fillText(Math.random()<.5?'0':'1',x,y);
          ctx.fillStyle='rgba(56,224,176,0.45)';ctx.fillText(Math.random()<.5?'0':'1',x,y-font);
          if(y>H&&Math.random()>.965)drops[i]=Math.random()*-20;drops[i]+=1;}}
      requestAnimationFrame(draw);})(0);
  })();

  var lines=[].slice.call(document.querySelectorAll('.bline'));
  var prog=document.getElementById('prog');
  var fill=document.getElementById('fill');
  var grant=document.getElementById('grant');
  var cur=document.getElementById('cur');
  function show(el){el&&el.classList.add('show');}

  var seq=[
    [200,  function(){show(lines[0]);}],
    [650,  function(){show(lines[1]);}],
    [1000, function(){show(lines[2]);}],
    [1380, function(){show(lines[3]);show(prog);requestAnimationFrame(function(){fill.style.width='100%';});}],
    [2050, function(){if(cur)cur.style.display='none';}],
    [2150, function(){show(lines[4]);}],
    [2500, function(){show(grant);}],
    [3200, function(){ go(); }],
  ];
  seq.forEach(function(s){ setTimeout(s[1], s[0]); });
})();
</script>
</body>
</html>
